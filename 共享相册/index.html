<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的相册</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ 我的相册</h1>
            <p class="subtitle">记录美好瞬间</p>
        </header>

        <div class="upload-section">
            <label for="fileInput" class="upload-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                上传图片
            </label>
            <input type="file" id="fileInput" accept="image/*" multiple hidden>
        </div>

        <div class="gallery" id="gallery"></div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImg">

            <div class="photo-actions">
                <button class="like-btn" id="likeBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                    <span id="likeCount">0</span>
                </button>
                <button class="delete-btn" id="deleteBtn">删除</button>
            </div>

            <div class="comments-section">
                <h3>评论</h3>
                <div class="comment-form">
                    <input type="text" id="authorInput" placeholder="你的名字（可选）" maxlength="20">
                    <textarea id="commentInput" placeholder="写下你的评论..." maxlength="200"></textarea>
                    <button id="submitComment">发表评论</button>
                </div>
                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
