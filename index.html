<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的相册</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 主题控制面板 -->
    <div class="theme-panel" id="themePanel">
        <button class="theme-toggle-btn" id="themeToggleBtn" title="切换深色/浅色模式">
            <span class="theme-icon">🌙</span>
        </button>
        <button class="theme-panel-btn" id="themePanelBtn" title="自定义主题">
            <span>🎨</span>
        </button>
        <div class="theme-dropdown" id="themeDropdown">
            <div class="theme-dropdown-title">主题包</div>
            <div class="theme-package-list">
                <button class="theme-package-btn" data-package="cream">奶油相册</button>
                <button class="theme-package-btn" data-package="film">胶片相册</button>
                <button class="theme-package-btn" data-package="summer">夏日相册</button>
            </div>
            <button class="auto-theme-btn" id="autoThemeBtn">跟着节日自动推荐</button>
            <div class="theme-dropdown-title" style="margin-top:12px">背景主题</div>
            <div class="theme-presets">
                <div class="theme-preset active" data-gradient="radial-gradient(circle at 18% 16%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 24%), radial-gradient(circle at 82% 14%, rgba(168,196,255,0.32) 0%, rgba(168,196,255,0) 26%), linear-gradient(180deg, #f7f9fc 0%, #eef3f9 46%, #e8edf6 100%)" title="清晨云光"></div>
                <div class="theme-preset" data-gradient="linear-gradient(135deg, #f5f1ea 0%, #e8ded2 45%, #d8cab8 100%)" title="香槟米金"></div>
                <div class="theme-preset" data-gradient="linear-gradient(135deg, #edf4ff 0%, #dbeafe 48%, #d8f0f4 100%)" title="雾蓝湖面"></div>
                <div class="theme-preset" data-gradient="linear-gradient(135deg, #f8f0ff 0%, #ebe4ff 45%, #e6d7ff 100%)" title="薄雾薰衣草"></div>
                <div class="theme-preset" data-gradient="linear-gradient(135deg, #fff6ef 0%, #ffe2d2 46%, #f7cbb8 100%)" title="日落奶杏"></div>
                <div class="theme-preset" data-gradient="linear-gradient(135deg, #eefaf4 0%, #dff3ea 46%, #cae6de 100%)" title="鼠尾草绿"></div>
                <div class="theme-preset" data-gradient="linear-gradient(135deg, #151a22 0%, #1d2532 46%, #283447 100%)" title="夜幕深蓝"></div>
                <div class="theme-preset" data-gradient="linear-gradient(135deg, #161321 0%, #24203a 46%, #332e5d 100%)" title="午夜紫幕"></div>
            </div>
            <div class="theme-dropdown-title" style="margin-top:12px">自定义渐变</div>
            <div class="custom-color-row">
                <label>起始色 <input type="color" id="colorStart" value="#f7f9fc"></label>
                <label>结束色 <input type="color" id="colorEnd" value="#d8e3f5"></label>
            </div>
            <button class="apply-color-btn" id="applyColorBtn">应用</button>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-emoji-row">
                <span class="header-emoji float-1">🌸</span>
                <span class="header-emoji float-2">📷</span>
                <span class="header-emoji float-3">✨</span>
                <span class="header-emoji float-4">🎞️</span>
                <span class="header-emoji float-5">🌟</span>
            </div>
            <div class="header-kicker" id="headerKicker">把寻常日子装订成家的回忆册</div>
            <h1>我的相册</h1>
            <p class="subtitle" id="dynamicSubtitle">记录美好瞬间</p>
            <p class="header-description" id="headerDescription">和家人一起上传、留言，把重要的小日子慢慢收进同一本相册。</p>
            <div class="header-actions">
                <span class="festival-badge" id="festivalBadge">节日推荐</span>
                <button class="recommend-theme-btn" id="recommendThemeBtn" type="button">一键切换主题</button>
            </div>
            <div class="header-stats" id="headerStats"></div>
        </header>

        <div class="upload-section">
            <label for="fileInput" class="upload-btn" id="uploadBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                上传图片
            </label>
            <button class="batch-delete-toggle-btn" id="batchDeleteToggleBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                </svg>
                多选
            </button>
            <button class="group-toggle-btn" id="createGroupBtn" type="button">新建分组</button>
            <input type="file" id="fileInput" accept="image/*" multiple hidden>
        </div>

        <div class="upload-meta-panel">
            <input type="text" id="captionInput" placeholder="给这一组照片写一句描述，例如：外婆生日的小聚会" maxlength="80">
            <input type="text" id="tagsInput" placeholder="标签用逗号分开，例如：生日,家宴,春天" maxlength="60">
        </div>

        <div class="album-toolbar">
            <div class="search-box">
                <input type="search" id="searchInput" placeholder="统一搜索分组、照片名称、描述或标签">
                <button id="clearSearchBtn" type="button" hidden>清空</button>
            </div>
            <div class="search-hint" id="searchHint">可以直接搜索分组名、照片名称、描述或标签，结果会回到对应分组里。</div>
        </div>

        <nav class="group-nav" id="groupNav" aria-label="照片分组导航"></nav>

        <!-- 上传进度条 -->
        <div class="upload-progress-wrap" id="uploadProgressWrap">
            <div class="upload-progress-bar" id="uploadProgressBar"></div>
            <div class="upload-progress-text" id="uploadProgressText">准备上传...</div>
        </div>

        <!-- 批量删除操作栏 -->
        <div class="batch-bar" id="batchBar">
            <span class="batch-count" id="batchCount">已选 0 张</span>
            <button class="batch-select-all-btn" id="batchSelectAllBtn">全选</button>
            <button class="batch-delete-btn" id="batchDeleteBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                删除所选
            </button>
            <button class="batch-cancel-btn" id="batchCancelBtn">取消</button>
        </div>

        <div class="gallery" id="gallery"></div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
        <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
        <div class="lightbox-content">
            <div class="lightbox-img-wrap">
                <img src="" alt="" id="lightboxImg">
                <!-- 图片滤镜覆盖层 -->
                <div class="filter-overlay" id="filterOverlay"></div>
            </div>

            <!-- 编辑切换按钮 -->
            <button class="edit-toggle-btn" id="editToggleBtn">✏️ 编辑图片</button>

            <!-- 滤镜工具栏 -->
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-filter="none">原图</button>
                <button class="filter-btn" data-filter="grayscale(100%)">黑白</button>
                <button class="filter-btn" data-filter="sepia(80%)">复古</button>
                <button class="filter-btn" data-filter="saturate(200%) hue-rotate(20deg)">鲜艳</button>
                <button class="filter-btn" data-filter="brightness(1.2) contrast(1.1)">明亮</button>
                <button class="filter-btn" data-filter="contrast(1.4) saturate(0.8)">冷峻</button>
                <button class="filter-btn" data-filter="hue-rotate(180deg) saturate(1.5)">赛博</button>
            </div>

            <!-- 图片编辑工具栏 -->
            <div class="edit-bar" id="editBar">
                <div class="edit-bar-title">✏️ 图片调整</div>
                <div class="edit-sliders">
                    <label>亮度 <input type="range" id="editBrightness" min="50" max="200" value="100"><span id="brightnessVal">100%</span></label>
                    <label>对比度 <input type="range" id="editContrast" min="50" max="200" value="100"><span id="contrastVal">100%</span></label>
                    <label>饱和度 <input type="range" id="editSaturate" min="0" max="300" value="100"><span id="saturateVal">100%</span></label>
                    <label>模糊 <input type="range" id="editBlur" min="0" max="10" value="0"><span id="blurVal">0px</span></label>
                </div>
                <div class="edit-actions">
                    <button id="resetEditBtn">重置</button>
                    <button id="saveEditBtn" class="save-edit-btn">保存效果</button>
                </div>
            </div>

            <div class="photo-story" id="photoStory"></div>

            <div class="photo-actions">
                <!-- 表情回应区 -->
                <div class="reactions-wrap">
                    <div class="reaction-btns" id="reactionBtns">
                        <button class="reaction-btn" data-emoji="❤️" title="爱心"><span>❤️</span><span class="reaction-count" id="react-heart">0</span></button>
                        <button class="reaction-btn" data-emoji="😂" title="哈哈"><span>😂</span><span class="reaction-count" id="react-laugh">0</span></button>
                        <button class="reaction-btn" data-emoji="😮" title="哇哦"><span>😮</span><span class="reaction-count" id="react-wow">0</span></button>
                        <button class="reaction-btn" data-emoji="😢" title="感动"><span>😢</span><span class="reaction-count" id="react-sad">0</span></button>
                        <button class="reaction-btn" data-emoji="👍" title="点赞"><span>👍</span><span class="reaction-count" id="react-like">0</span></button>
                    </div>
                </div>
                <button class="delete-btn" id="deleteBtn">删除</button>
            </div>

            <div class="comments-section">
                <h3>评论</h3>
                <div class="comment-form">
                    <input type="text" id="authorInput" placeholder="你的名字（可选）" maxlength="20">
                    <textarea id="commentInput" placeholder="写下你的评论..." maxlength="200"></textarea>
                    <button id="submitComment">发表评论</button>
                </div>
                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>
    </div>

    <!-- 删除密码弹窗 -->
    <div class="pwd-modal" id="pwdModal">
        <div class="pwd-box">
            <div class="pwd-title">🔒 请输入删除密码</div>
            <input type="password" id="pwdInput" placeholder="密码" maxlength="32" autocomplete="off">
            <div class="pwd-error" id="pwdError"></div>
            <div class="pwd-actions">
                <button id="pwdCancelBtn">取消</button>
                <button id="pwdConfirmBtn" class="pwd-confirm">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 昵称设置弹窗 -->
    <div class="nickname-modal" id="nicknameModal">
        <div class="nickname-box">
            <div class="nickname-title">👋 欢迎来到相册</div>
            <div class="nickname-desc">请设置你的昵称，方便大家认识你</div>
            <input type="text" id="nicknameInput" placeholder="输入昵称（2-10个字）" maxlength="10" autocomplete="off">
            <div class="nickname-error" id="nicknameError"></div>
            <button id="nicknameConfirmBtn" class="nickname-confirm">进入相册</button>
        </div>
    </div>

    <!-- 右上角用户信息 -->
    <div class="user-badge" id="userBadge">
        <span class="user-avatar" id="userAvatar"></span>
        <span class="user-name" id="userName"></span>
        <button class="user-edit-btn" id="userEditBtn" title="修改昵称">✏️</button>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
